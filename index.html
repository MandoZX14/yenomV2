<script>
const PIN_CODE = '1704';
const PAIRS = ['BTC','ETH','SOL','PEPE','WIF','BONK'];
let capital = parseFloat(localStorage.getItem('cap') ?? '20.57');
let capitalGoal = parseFloat(localStorage.getItem('goal') ?? '50');
let apiKey = localStorage.getItem('gemKey') || '';
let curPair = 'BTC';
let prices = {};
let ws = null;
let tcnt = 0, ttmr = null;
let pinBuf = '';
let blurOn = false;
let tradeHistory = JSON.parse(localStorage.getItem('trades') ?? '[]');
let curOpp = null;
let selectedLever = 10;
let sigTimer = null;

function fp(n){ return parseFloat(n).toFixed(2); }
const ls = (k,v) => localStorage.setItem(k,v);
const fdt = ts => new Date(ts).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});

function toast(msg,type='ok'){
  const t = document.createElement('div');
  t.className = 'tst';
  t.innerHTML = msg;
  if(type==='err') t.style.border = '1px solid var(--red)';
  else if(type==='warn') t.style.border = '1px solid var(--gold)';
  else t.style.border = '1px solid var(--cyan)';
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity='1'; t.style.transform='translateX(-50%) translateY(0)'; });
  setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(-50%) translateY(10px)'; setTimeout(()=>t.remove(),300); }, 2600);
}

// --- WEBSOCKET ---
function connectWS(){
  if(ws) ws.close();
  const streams = PAIRS.map(p=>p.toLowerCase()+'usdt@ticker').join('/');
  ws = new WebSocket('wss://stream.binance.com:9443/stream?streams='+streams);
  ws.onopen = () => { document.getElementById('ws-st').textContent = 'CONNECTÉ'; document.getElementById('ws-st').style.color = 'var(--green)'; }
  ws.onmessage = e => {
    const d = JSON.parse(e.data).data;
    if(!d?.s) return;
    const sym = d.s.replace('USDT','');
    prices[sym] = {price: parseFloat(d.c), change: parseFloat(d.P), high: parseFloat(d.h), low: parseFloat(d.l), vol: parseFloat(d.q)};
    updateTickerItem(sym);
    if(sym===curPair) updateMainPrice();
  };
}

function buildTicker(){
  document.getElementById('tbar').innerHTML = PAIRS.map(p=>`<div class="titem" id="ti-${p}" onclick="switchPair('${p}')"></div>`).join('');
}
function updateTickerItem(sym){
  const el = document.getElementById('ti-'+sym);
  if(!el) return;
  const col = prices[sym].change >= 0 ? 'var(--green)' : 'var(--red)';
  el.innerHTML = `<span style="font-size:11px; font-weight:700; color:var(--txt-main); font-family:var(--font-mono);">${sym}</span>
                  <span style="display:block; margin-top:4px; font-size:12px; color:${col}; font-family:var(--font-mono);">${fp(prices[sym].price)}</span>`;
}
function switchPair(p){ 
  curPair=p; 
  document.getElementById('pair-badge').textContent=p+'/USDT'; 
  document.querySelectorAll('.titem').forEach(e => e.classList.remove('on'));
  const el = document.getElementById('ti-'+p);
  if(el) el.classList.add('on');
  updateMainPrice(); 
}
function updateMainPrice(){
  const d = prices[curPair]; if(!d) return;
  const mp = document.getElementById('main-price');
  mp.textContent = '$'+fp(d.price);
  mp.style.color = d.change >= 0 ? 'var(--cyan)' : 'var(--red)';
  
  const cb = document.getElementById('chg-badge');
  cb.textContent = (d.change>=0?'+':'') + d.change.toFixed(2)+'%';
  cb.className = 'badge ' + (d.change>=0?'green':'red');
  
  document.getElementById('hi-v').textContent = '$'+fp(d.high);
  document.getElementById('lo-v').textContent = '$'+fp(d.low);
  document.getElementById('vo-v').textContent = (d.vol / 1000).toFixed(1)+'K';
}

// --- WALLET ---
function updateWallet(){
  document.getElementById('cap-v').textContent = capital.toFixed(2);
  const pct = capitalGoal > 0 ? Math.min((capital/capitalGoal)*100, 100) : 0;
  document.getElementById('goal-bar').style.width = pct + '%';
  document.getElementById('goal-pct').textContent = pct.toFixed(1) + '%';
}
function openWallet(){ document.getElementById('w-cap').value=capital; document.getElementById('wl-ov').style.display='flex'; }
function closeWallet(){ document.getElementById('wl-ov').style.display='none'; }
function saveWallet(){ capital=parseFloat(document.getElementById('w-cap').value); ls('cap',capital); updateWallet(); closeWallet(); toast('Capital mis à jour');}

// --- OPPS & TRADES ---
function buildOpps(){
  const ops = [
    {asset:'SOL',dir:'LONG',conf:91,lever:13, reason:'Breakout majeur validé sur RSI 1H.'},
    {asset:'BTC',dir:'SHORT',conf:84,lever:10, reason:'Rejet résistance institutionnelle 4H.'}
  ];
  document.getElementById('opp-grid').innerHTML = ops.map(o=>{
    const col = o.dir === 'LONG' ? 'var(--green)' : 'var(--red)';
    const badge = o.dir === 'LONG' ? 'green' : 'red';
    return `<div class="ocard" onclick="openTrade('${o.asset}', '${o.dir}', ${o.lever}, ${o.conf}, '${o.reason}')">
              <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                <span class="mono font-bold" style="font-size:16px;">${o.asset}</span>
                <span class="badge ${badge}">${o.dir}</span>
              </div>
              <div class="mono" style="font-size:24px; font-weight:800; color:${o.conf>85?'var(--cyan)':'var(--gold)'}">${o.conf}%</div>
              <div style="font-size:11px; color:var(--txt-muted); margin-top:8px;">Tap pour analyser →</div>
            </div>`;
  }).join('');
}

function openTrade(asset, dir, lev, conf, reason){
  curOpp = {asset, dir, lever:lev, conf, reason};
  selectedLever = lev;
  const p = prices[asset]?.price || 0;
  
  document.getElementById('tm-asset').textContent = asset+'/USDT';
  document.getElementById('tm-dir').textContent = dir;
  document.getElementById('tm-dir').className = 'badge ' + (dir==='LONG'?'green':'red');
  document.getElementById('tm-lev').textContent = 'x'+lev;
  document.getElementById('tm-conf-b').textContent = conf+'% CONF.';
  document.getElementById('tm-reason').textContent = reason;
  
  document.getElementById('lev-slider').value = lev;
  document.getElementById('lev-display').textContent = 'x'+lev;
  
  if(p > 0){
    document.getElementById('tm-entry').textContent = '$'+fp(p);
    document.getElementById('tm-tp').textContent = '$'+fp(dir==='LONG' ? p*1.04 : p*0.96);
    document.getElementById('tm-sl').textContent = '$'+fp(dir==='LONG' ? p*0.985 : p*1.015);
  } else {
    document.getElementById('tm-entry').textContent = 'Market';
    document.getElementById('tm-tp').textContent = '+4%';
    document.getElementById('tm-sl').textContent = '-1.5%';
  }
  
  document.getElementById('tm-ov').style.display='flex';
}
function updateLevSlider(v){
  selectedLever = parseInt(v);
  document.getElementById('lev-display').textContent = 'x'+v;
  document.getElementById('tm-lev').textContent = 'x'+v;
}
function closeTrade(){ document.getElementById('tm-ov').style.display='none'; }
function refuseTrade(){ closeTrade(); toast('Opportunité ignorée'); }
function acceptTrade(){
  if(!curOpp) return;
  const trade = { id:Date.now(), asset:curOpp.asset, dir:curOpp.dir, lever:selectedLever, ts:Date.now(), r:'open' };
  tradeHistory.push(trade); ls('trades', JSON.stringify(tradeHistory));
  closeTrade(); toast(`Position ${curOpp.asset} x${selectedLever} ouverte !`);
}

// --- JOURNAL ---
function openJournal(){
  const wrap=document.getElementById('jr-full');
  if(!tradeHistory.length){ wrap.innerHTML='<div style="text-align:center; color:var(--txt-muted); padding:20px;">Aucun historique</div>'; }
  else {
    wrap.innerHTML=[...tradeHistory].reverse().map(t=>{
      const bg = t.dir==='LONG'?'rgba(0,255,102,0.1)':'rgba(255,42,85,0.1)';
      const col = t.dir==='LONG'?'var(--green)':'var(--red)';
      return `<div style="background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:12px; padding:16px; display:flex; align-items:center; gap:12px;">
                <div class="mono font-bold" style="font-size:16px; min-width:40px;">${t.asset}</div>
                <div class="badge" style="background:${bg}; color:${col};">${t.dir}</div>
                <div class="mono" style="font-size:12px; color:var(--txt-muted);">x${t.lever}</div>
                <div style="margin-left:auto; font-size:12px; color:var(--txt-dark);">${fdt(t.ts)}</div>
              </div>`;
    }).join('');
  }
  document.getElementById('jr-ov').style.display='flex';
}
function closeJournal(){ document.getElementById('jr-ov').style.display='none'; }

// --- PIN & SETTINGS ---
function titleClick(){ tcnt++; clearTimeout(ttmr); ttmr=setTimeout(()=>tcnt=0,1500); if(tcnt>=5){ tcnt=0; document.getElementById('pin-ov').style.display='flex'; } }
function closePIN(){ document.getElementById('pin-ov').style.display='none'; pinBuf=''; updatePinDots(); }
function pk(v){
  if(v==='C') pinBuf=''; else if(v==='D') pinBuf=pinBuf.slice(0,-1); else if(pinBuf.length<4) pinBuf+=v;
  updatePinDots();
  if(pinBuf.length===4){
    if(pinBuf===PIN_CODE){ closePIN(); document.getElementById('api-in').value=apiKey; document.getElementById('st-ov').style.display='flex'; }
    else { toast('Code PIN erroné', 'err'); pinBuf=''; updatePinDots(); }
  }
}
function updatePinDots(){ for(let i=0;i<4;i++){ const el=document.getElementById('pd'+i); if(el) el.style.background = (i<pinBuf.length) ? 'var(--cyan)' : 'transparent'; } }
function closeST(){ document.getElementById('st-ov').style.display='none'; }
function saveKey(){ apiKey=document.getElementById('api-in').value.trim(); ls('gemKey',apiKey); closeST(); toast('Clé API enregistrée'); }
function toggleBlur(){ blurOn=!blurOn; document.body.classList.toggle('blured',blurOn); }
function closeSig(){ document.getElementById('sig-banner').style.display='none'; clearInterval(sigTimer); }

// --- IA GEMINI (NOUVEAU CERVEAU MENTOR CHILL + FORÇAGE DES PRIX) ---
function buildSystemPrompt() { 
  return `Tu es SNIPER, un trader pro et un mentor crypto. Ton style est "chill", naturel, humain et clair. Tu t'exprimes de manière décontractée mais experte (un peu comme un pote calé en trading). Tes explications sont concises, percutantes et faciles à lire. Évite absolument le mode "robot" ou les longues listes à puces interminables, sauf si on te demande un Setup précis.`; 
}

let activeGeminiModel = null;
async function callGemini(userMsg) {
  if (!apiKey) throw new Error("Accès API non configuré.");
  
  if (Object.keys(prices).length === 0) {
    throw new Error("Connexion au marché en cours. Réessayez dans 2 secondes.");
  }

  // On récupère tous les prix et on les prépare
  const allPrices = Object.keys(prices)
    .map(p => `${p} = $${prices[p]?.price ? prices[p].price.toFixed(2) : 'N/A'}`)
    .join(' | ');

  // On crée une instruction invisible qu'on colle au message de l'utilisateur
  const forcedContext = `
  \n\n---
  [INSTRUCTION SYSTÈME INVISIBLE POUR TE FORCER À UTILISER LE BON PRIX]
  Attention SNIPER : Les prix ACTUELS et RÉELS du marché à la seconde près sont : ${allPrices}.
  RÈGLE ABSOLUE : Si tu parles d'une crypto, TU DOIS regarder cette liste et utiliser EXACTEMENT ce prix. Si le SOL est à 86$, tu dis 86$. N'invente rien, n'utilise pas tes anciennes données.
  Sois chill, réponds clairement au message de l'utilisateur ci-dessus.
  ---`;

  if (!activeGeminiModel) {
    try {
      const listResp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models`, { headers: { 'x-goog-api-key': apiKey } });
      const listData = await listResp.json();
      if (listData.models) {
        const validModels = listData.models.filter(m => m.supportedGenerationMethods?.includes("generateContent"));
        const bestModel = validModels.find(m => m.name.includes("flash")) || validModels.find(m => m.name.includes("pro")) || validModels[0];
        if (bestModel) activeGeminiModel = bestModel.name.replace('models/', '');
      }
    } catch (e) { console.warn("Auto-discovery fallback"); }
  }

  const useModel = activeGeminiModel || "gemini-1.5-flash";
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${useModel}:generateContent`;

  const payload = {
    // On fusionne le message de l'utilisateur avec notre contrainte de prix cachée
    contents: [{ role: "user", parts: [{ text: buildSystemPrompt() + "\n\nMessage : " + userMsg + forcedContext }] }],
    // Température à 0.6 pour le rendre un peu plus naturel et moins robotique
    generationConfig: { temperature: 0.6, maxOutputTokens: 2000 }
  };

  const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey }, body: JSON.stringify(payload) });
  const data = await resp.json();
  if (!resp.ok) { activeGeminiModel = null; throw new Error(data.error?.message || "Erreur de connexion."); }
  return data.candidates?.[0]?.content?.parts?.[0]?.text || 'Silence réseau.';
}

function addAIMsg(text){
  const chat = document.getElementById('chat');
  const div = document.createElement('div'); div.className = 'cmsg-ai';
  // On nettoie les petites balises markdown pour que ce soit propre
  let formattedText = text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>');
  div.innerHTML = `<div style="font-size:10px; color:var(--cyan); margin-bottom:6px; font-weight:700; font-family:var(--font-mono);">SNIPER IA ✦</div>${formattedText}`;
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
}

async function sendChat(){
  const inp = document.getElementById('ci'); const msg = inp.value.trim(); if(!msg) return;
  if(!apiKey){ toast('Authentification API requise','err'); return; }
  
  if(!prices[curPair]?.price) {
    toast('Attente de la connexion au flux Binance...', 'warn');
    return;
  }

  inp.value = '';
  const chat = document.getElementById('chat');
  const userDiv = document.createElement('div'); userDiv.className = 'cmsg-user'; userDiv.textContent = msg;
  chat.appendChild(userDiv); chat.scrollTop = chat.scrollHeight;
  
  const sb = document.getElementById('sb'); const status = document.getElementById('ai-st');
  sb.disabled = true; status.textContent = '● CALCUL EN COURS...'; status.style.color = 'var(--gold)';
  
  try {
    const reply = await callGemini(msg);
    addAIMsg(reply);
  } catch(e) {
    addAIMsg('❌ Erreur : ' + e.message);
  } finally {
    sb.disabled = false; status.textContent = '● CONNECTÉ'; status.style.color = 'var(--green)';
  }
}

async function doAiScan(){ document.getElementById('ci').value = `Fais-moi une analyse rapide du marché sur ${curPair}.`; await sendChat(); }
async function doAiOpps(){ document.getElementById('ci').value = `Propose-moi un setup de trading clair pour ${curPair}.`; await sendChat(); }

// --- INIT ---
function init(){
  buildTicker(); switchPair('BTC'); buildOpps(); updateWallet(); connectWS();
  setTimeout(()=>{
    const ban = document.getElementById('sig-banner');
    ban.style.display = 'flex';
    let t=10; document.getElementById('sig-timer').textContent='10s';
    sigTimer = setInterval(()=>{ t--; document.getElementById('sig-timer').textContent=t+'s'; if(t<=0){closeSig();} }, 1000);
  }, 4000);
}
document.addEventListener('DOMContentLoaded', init);
</script>
