<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Smart Trading AI - Yenom Cloud</title>
<script src="https://cdn.tailwindcss.com"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // Configuration Firebase (COLLE TES INFOS ICI)
  const firebaseConfig = {
    apiKey: "XXXX",
    authDomain: "XXXX.firebaseapp.com",
    projectId: "XXXX",
    storageBucket: "XXXX.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Exposer les fonctions au reste du code
  window.saveToCloud = async (data) => {
    await setDoc(doc(db, "users", "yenom_profile"), data, { merge: true });
  };

  window.loadFromCloud = async () => {
    const snap = await getDoc(doc(db, "users", "yenom_profile"));
    return snap.exists() ? snap.data() : null;
  };
</script>

<style>
  :root {
    --bg: #0F172A; --glass: rgba(255,255,255,0.05);
    --cyan: #22D3EE; --green: #10B981; --red: #EF4444;
  }
  body { background: var(--bg); color: #F1F5F9; font-family: 'Inter', sans-serif; min-height: 100vh; }
  .bg-grid { background-image: radial-gradient(ellipse at 20% 50%, rgba(34,211,238,0.06) 0%, transparent 50%); }
  .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
  .neon-cyan { color: var(--cyan); text-shadow: 0 0 20px rgba(34,211,238,0.5); }
  .blurred { filter: blur(12px) !important; user-select: none; pointer-events: none; }
  
  @keyframes ticker-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  .ticker-track { display: flex; animation: ticker-scroll 30s linear infinite; width: max-content; }
  .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; display: inline-block; }
  .opportunity-card { cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.04); border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); }
  .chat-msg-ai { background: rgba(255,255,255,0.05); border-radius: 16px 16px 16px 4px; padding: 10px; margin-bottom: 8px; font-size: 14px; }
  .chat-msg-user { background: rgba(34,211,238,0.15); border-radius: 16px 16px 4px 16px; padding: 10px; margin-bottom: 8px; align-self: flex-end; font-size: 14px; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(6px); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--cyan); }
  .pin-dot.filled { background: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
</style>
</head>
<body class="bg-grid p-4">

<div id="signal-banner" class="fixed top-0 left-0 right-0 z-[200] hidden translate-y-[-100%] transition-transform duration-500">
  <div class="bg-cyan-950/90 border-b border-cyan-500/50 p-4 flex justify-between items-center backdrop-blur-md">
    <div class="flex items-center gap-3">
      <div class="live-dot" style="background:var(--cyan)"></div>
      <span class="font-bold text-cyan-400 tracking-widest text-sm uppercase">Sniper Signal Détecté</span>
    </div>
    <button onclick="closeBanner()" class="text-white/50">✕</button>
  </div>
</div>

<div class="max-w-[900px] mx-auto space-y-4">
  <div class="flex justify-between items-center">
    <div onclick="handleTitleClick()" class="cursor-pointer">
      <h1 class="font-black text-xl tracking-tighter">SMART TRADING AI</h1>
      <div class="flex items-center gap-2 text-[10px] text-slate-500">
        <div class="live-dot"></div> LIVE CLOUD FEED
      </div>
    </div>
    <div class="flex gap-2">
      <button onclick="toggleBlur()" id="eye-btn" class="glass px-3 py-2 text-slate-400">👁</button>
      <button onclick="showPinModal()" class="glass px-3 py-2 text-slate-400">⚙️</button>
    </div>
  </div>

  <div class="glass overflow-hidden py-2 text-[11px]">
    <div class="ticker-track" id="ticker-track">
      <div class="px-4">BTC/USDT --</div><div class="px-4">ETH/USDT --</div><div class="px-4">SOL/USDT --</div>
      <div class="px-4">BTC/USDT --</div><div class="px-4">ETH/USDT --</div><div class="px-4">SOL/USDT --</div>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div class="glass p-5 space-y-4" id="price-card">
      <div class="flex justify-between items-center">
        <span class="text-[10px] font-bold text-slate-500 tracking-widest uppercase">Solana Live</span>
        <div class="flex gap-2">
          <button onclick="setPair('SOL')" class="text-[11px] px-2 py-1 rounded bg-cyan-500/10 text-cyan-400">SOL</button>
          <button onclick="setPair('BTC')" class="text-[11px] px-2 py-1 rounded bg-slate-800">BTC</button>
        </div>
      </div>
      <div>
        <h2 id="current-pair-text" class="text-slate-400 text-xs">SOL / USDT</h2>
        <div id="main-price" class="text-5xl font-black neon-cyan py-2">$0.00</div>
        <div id="price-change" class="text-sm font-bold text-emerald-400">+0.00%</div>
      </div>
    </div>

    <div class="glass p-5 flex flex-col justify-center" id="capital-card">
      <span class="text-[10px] font-bold text-slate-500 tracking-widest mb-2 text-white">PORTEFEUILLE</span>
      <div id="capital-val" class="text-4xl font-black text-emerald-400">$20.57</div>
      <div class="mt-4 space-y-1">
        <div class="flex justify-between text-[10px] text-slate-500">
          <span>Objectif $50.00</span>
          <span id="goal-pct">41%</span>
        </div>
        <div class="h-1.5 bg-slate-800 rounded-full overflow-hidden">
          <div id="goal-bar" class="h-full bg-emerald-500" style="width: 41%"></div>
        </div>
      </div>
    </div>

    <div class="glass p-5 md:col-span-2 h-[350px] flex flex-col">
      <div id="chat-content" class="flex-1 overflow-y-auto space-y-3 pr-2 mb-4 flex flex-col"></div>
      <div class="flex gap-2">
        <input id="chat-input" type="text" placeholder="Analyser le marché..." class="flex-1 bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-2 text-sm outline-none focus:border-cyan-500">
        <button onclick="sendMsg()" class="bg-cyan-500 text-slate-900 font-bold px-4 rounded-xl text-sm">ENVOYER</button>
      </div>
    </div>
  </div>
</div>

<div id="pin-modal" class="fixed inset-0 bg-slate-950/95 z-[300] hidden flex items-center justify-center">
  <div class="text-center space-y-8">
    <div class="flex justify-center gap-4" id="pin-dots">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="grid grid-cols-3 gap-4" id="keypad"></div>
    <button onclick="closePin()" class="text-slate-600 text-sm">Annuler</button>
  </div>
</div>

<div id="settings-modal" class="overlay hidden">
  <div class="glass w-full max-w-md p-8 rounded-b-none space-y-6">
    <h3 class="text-xl font-bold">Réglages Cloud</h3>
    <input id="api-key" type="password" placeholder="Clé API Gemini" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-white">
    <input id="set-cap" type="number" step="0.01" placeholder="Capital" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-white">
    <button onclick="saveSettings()" class="w-full py-4 bg-emerald-500 text-slate-900 font-bold rounded-xl uppercase">Sauvegarder</button>
  </div>
</div>

<script>
  const PIN_CODE = "1704";
  let currentPin = "";
  let isBlurred = false;
  let titleClicks = 0;
  let capital = 20.57;
  let apiKey = "";
  let currentPair = "SOLUSDT";

  // CHARGEMENT CLOUD
  window.addEventListener('load', async () => {
    const data = await window.loadFromCloud();
    if(data) {
      capital = data.capital || 20.57;
      apiKey = data.apiKey || "";
      updateCapUI();
    }
    initBinance();
    buildKeypad();
    addChatMsg("Système Yenom prêt. Connecté au Cloud.");
  });

  // BINANCE
  function initBinance() {
    const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${currentPair.toLowerCase()}@ticker`);
    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      const price = parseFloat(data.c);
      const change = parseFloat(data.P);
      document.getElementById('main-price').innerText = isBlurred ? "****" : `$${price.toFixed(2)}`;
      document.getElementById('price-change').innerText = `${change > 0 ? '+' : ''}${change.toFixed(2)}%`;
    };
  }

  function setPair(p) { currentPair = p + "USDT"; initBinance(); }

  // PIN & SETTINGS
  function buildKeypad() {
    const keys = [1,2,3,4,5,6,7,8,9,'C',0,'⌫'];
    const container = document.getElementById('keypad');
    container.innerHTML = "";
    keys.forEach(k => {
      const btn = document.createElement('button');
      btn.className = "w-16 h-16 glass flex items-center justify-center text-xl font-bold active:bg-cyan-500";
      btn.innerText = k;
      btn.onclick = () => pressPin(k.toString());
      container.appendChild(btn);
    });
  }

  function pressPin(k) {
    if(k === 'C') currentPin = "";
    else if(k === '⌫') currentPin = currentPin.slice(0, -1);
    else if(currentPin.length < 4) currentPin += k;
    
    document.querySelectorAll('.pin-dot').forEach((d, i) => d.classList.toggle('filled', i < currentPin.length));
    if(currentPin === PIN_CODE) { setTimeout(() => { closePin(); showSettings(); }, 200); }
  }

  function showPinModal() { document.getElementById('pin-modal').classList.remove('hidden'); }
  function closePin() { currentPin = ""; document.getElementById('pin-modal').classList.add('hidden'); }
  function showSettings() { 
    document.getElementById('api-key').value = apiKey;
    document.getElementById('set-cap').value = capital;
    document.getElementById('settings-modal').classList.remove('hidden'); 
  }

  async function saveSettings() {
    apiKey = document.getElementById('api-key').value;
    capital = parseFloat(document.getElementById('set-cap').value);
    
    // Sauvegarde Cloud
    await window.saveToCloud({ capital: capital, apiKey: apiKey });
    
    updateCapUI();
    document.getElementById('settings-modal').classList.add('hidden');
    addChatMsg("Données synchronisées avec Firebase.");
  }

  function updateCapUI() {
    document.getElementById('capital-val').innerText = `$${capital.toFixed(2)}`;
    const pct = Math.min((capital / 50) * 100, 100);
    document.getElementById('goal-pct').innerText = `${pct.toFixed(0)}%`;
    document.getElementById('goal-bar').style.width = `${pct}%`;
  }

  function toggleBlur() {
    isBlurred = !isBlurred;
    document.getElementById('price-card').classList.toggle('blurred', isBlurred);
    document.getElementById('capital-card').classList.toggle('blurred', isBlurred);
  }

  function handleTitleClick() {
    titleClicks++;
    if(titleClicks >= 5) { titleClicks = 0; showPinModal(); }
    setTimeout(() => { titleClicks = 0; }, 2000);
  }

  // GEMINI
  async function sendMsg() {
    const input = document.getElementById('chat-input');
    const msg = input.value;
    if(!msg || !apiKey) return;
    addChatMsg(msg, true);
    input.value = "";
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ parts: [{ text: `Trader Yenom. Cap: ${capital}$. Analyse: ${msg}. Termine par VIBRATE_SIGNAL si signal.` }] }] })
      });
      const data = await res.json();
      const reply = data.candidates[0].content.parts[0].text;
      addChatMsg(reply);
      if(reply.includes("VIBRATE_SIGNAL")) triggerSniper();
    } catch (e) { addChatMsg("Erreur API."); }
  }

  function addChatMsg(t, isUser = false) {
    const box = document.getElementById('chat-content');
    const div = document.createElement('div');
    div.className = isUser ? "chat-msg-user" : "chat-msg-ai";
    div.innerText = t;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function triggerSniper() {
    const b = document.getElementById('signal-banner');
    b.classList.remove('hidden'); b.style.transform = "translateY(0)";
    if(navigator.vibrate) navigator.vibrate([300, 100, 300]);
    setTimeout(() => { b.style.transform = "translateY(-100%)"; }, 4000);
  }
</script>
</body>
</html>
