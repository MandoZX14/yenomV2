<style>
/* ══════════════════════════════════════════════════════
   SNIPER V4 — SOFT GLASSMORPHISM AÉRÉ
   Direction: Inter Display × DM Mono
   Palette: Slate profond / Violet doux / Rose poudré / Or pâle
══════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&family=Sora:wght@300;400;600&display=swap');

:root{
  --bg-1:  #0d0f1a;
  --bg-2:  #111326;
  --bg-3:  #161830;

  --glass-1: rgba(255,255,255,.04);
  --glass-2: rgba(255,255,255,.07);
  --glass-3: rgba(255,255,255,.11);

  --border:  rgba(255,255,255,.09);
  --border2: rgba(255,255,255,.16);
  --border3: rgba(255,255,255,.22);

  --violet:  #a78bfa;
  --violet2: #c4b5fd;
  --violet3: rgba(167,139,250,.12);
  --violet4: rgba(167,139,250,.05);

  --rose:    #f9a8d4;
  --rose2:   rgba(249,168,212,.10);

  --sky:     #7dd3fc;
  --sky2:    rgba(125,211,252,.10);

  --gold:    #fcd34d;
  --gold2:   rgba(252,211,77,.10);

  --green:   #6ee7b7;
  --green2:  rgba(110,231,183,.10);

  --red:     #fca5a5;
  --red2:    rgba(252,165,165,.10);

  --txt:     #e8eaf6;
  --txt2:    #9198b3;
  --txt3:    #555e7a;

  --font-d:  'Sora', sans-serif;
  --font-s:  'Inter', sans-serif;
  --font-m:  'DM Mono', monospace;

  --r-sm:  10px;
  --r-md:  16px;
  --r-lg:  22px;
  --r-xl:  28px;
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body{
  background: var(--bg-1);
  color: var(--txt);
  font-family: var(--font-s);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Ambient background orbs ── */
body::before{
  content:'';
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 600px 400px at 15% 20%, rgba(167,139,250,.07) 0%, transparent 70%),
    radial-gradient(ellipse 400px 500px at 85% 70%, rgba(125,211,252,.05) 0%, transparent 65%),
    radial-gradient(ellipse 300px 300px at 50% 90%, rgba(249,168,212,.04) 0%, transparent 60%);
}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

/* ── Layout ── */
#wrapper{
  position:relative;z-index:1;
  max-width:1000px;margin:0 auto;
  padding:0 18px 100px;
}

/* ══ HEADER ══ */
#hdr{
  padding:28px 0 20px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  margin-bottom:28px;
}
.logo{
  font-family:var(--font-d);
  font-size:22px;font-weight:600;
  letter-spacing:.04em;
  background: linear-gradient(135deg, #fff 30%, var(--violet2) 70%, var(--rose));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  cursor:pointer;user-select:none;
}
.logo-sub{
  font-family:var(--font-m);font-size:10px;
  letter-spacing:.18em;color:var(--txt3);
  text-transform:uppercase;margin-top:5px;
  display:flex;align-items:center;gap:8px;
}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* Live dot */
.livepulse{
  width:6px;height:6px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 10px rgba(110,231,183,.5);
  animation:livep 2.4s ease-in-out infinite;
  display:inline-block;flex-shrink:0;
}
@keyframes livep{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}

/* ══ GLASS CARD ══ */
.card{
  background:var(--glass-1);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  position:relative;overflow:hidden;
  transition:border-color .25s,background .25s;
}
.card:hover{
  border-color:var(--border2);
  background:var(--glass-2);
}

/* Subtle inner shimmer top */
.card::before{
  content:'';
  position:absolute;top:0;left:10%;right:10%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);
  pointer-events:none;border-radius:50%;
}

/* ── Section label ── */
.slbl{
  font-family:var(--font-m);font-size:9px;
  letter-spacing:.22em;color:var(--txt3);
  text-transform:uppercase;
  display:flex;align-items:center;gap:10px;
}
.slbl::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,var(--border),transparent);
}

/* ══ TICKER ══ */
#ticker-wrap{
  border:1px solid var(--border);
  border-radius:var(--r-md);
  background:var(--glass-1);
  backdrop-filter:blur(20px);
  overflow:hidden;margin-bottom:28px;
}
.tbar{
  display:flex;gap:0;overflow-x:auto;scrollbar-width:none;
}
.tbar::-webkit-scrollbar{display:none}
.titem{
  flex-shrink:0;min-width:100px;
  padding:14px 16px;cursor:pointer;
  border-right:1px solid var(--border);
  transition:background .2s;
  display:flex;flex-direction:column;gap:4px;
}
.titem:last-child{border-right:none}
.titem:hover{background:var(--glass-2)}
.titem.on{
  background:var(--violet3);
  border-bottom:2px solid var(--violet);
}
.ti-sym{
  font-family:var(--font-m);font-size:9px;
  color:var(--txt3);letter-spacing:.15em;
}
.ti-price{
  font-family:var(--font-m);font-size:12px;font-weight:500;
}
.ti-chg{
  font-family:var(--font-m);font-size:9px;
}

/* ══ BENTO GRID ══ */
.bento{display:grid;gap:14px;margin-bottom:14px}
.bento-2{grid-template-columns:1fr 1fr}
.bento-3{grid-template-columns:110px 1fr 1fr}
@media(max-width:580px){.bento-2,.bento-3{grid-template-columns:1fr}}

/* ── Price card ── */
.price-card{padding:28px 26px}
.price-main{
  font-family:var(--font-d);
  font-size:52px;font-weight:300;
  line-height:1;letter-spacing:-.03em;
  color:var(--txt);
  margin:14px 0 10px;
}
.pair-label{
  font-family:var(--font-m);font-size:9px;
  letter-spacing:.2em;color:var(--violet2);
  border:1px solid rgba(167,139,250,.25);
  padding:4px 10px;border-radius:var(--r-sm);
  display:inline-block;background:var(--violet4);
}
.chg-pill{
  font-family:var(--font-m);font-size:11px;font-weight:500;
  padding:4px 12px;border-radius:var(--r-sm);
  display:inline-block;border:1px solid;
}
.chg-pill.up{
  color:var(--green);
  border-color:rgba(110,231,183,.25);
  background:var(--green2);
}
.chg-pill.dn{
  color:var(--red);
  border-color:rgba(252,165,165,.25);
  background:var(--red2);
}
.hlv-row{display:flex;gap:16px;margin-top:4px}
.hlv-item{
  font-family:var(--font-m);font-size:10px;
  color:var(--txt3);
}
.hlv-item span{color:var(--txt2)}

/* Mini chart */
.minichart{
  height:36px;display:flex;
  align-items:flex-end;gap:2px;margin-top:16px;
}
.mbar{
  border-radius:3px;min-height:3px;flex-shrink:0;width:4px;
  opacity:.75;
}

/* ── Wallet ── */
.wallet-card{padding:26px}
.wallet-cap{
  font-family:var(--font-d);
  font-size:38px;font-weight:300;
  letter-spacing:-.02em;
  color:var(--gold);line-height:1.1;
  margin:10px 0 6px;
}
.wallet-sub{
  font-family:var(--font-m);font-size:10px;
  color:var(--txt3);line-height:1.8;
}
.progress-track{
  height:2px;background:rgba(255,255,255,.06);
  border-radius:2px;margin:12px 0 6px;overflow:hidden;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--violet),var(--rose));
  border-radius:2px;
  transition:width 1s cubic-bezier(.25,.8,.25,1);
}
.wallet-stats{
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;margin-top:14px;
}
.wstat{
  background:var(--glass-2);
  border:1px solid var(--border);
  border-radius:var(--r-sm);padding:10px 12px;
  backdrop-filter:blur(10px);
}
.wstat-l{
  font-family:var(--font-m);font-size:8px;
  letter-spacing:.15em;color:var(--txt3);
  text-transform:uppercase;margin-bottom:4px;
}
.wstat-v{
  font-family:var(--font-m);font-size:14px;font-weight:500;
}

/* ── F&G ── */
.fg-card{
  padding:20px 14px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
}
.fg-num{
  font-family:var(--font-d);font-size:30px;
  font-weight:300;letter-spacing:-.02em;line-height:1;
}
.fg-txt{
  font-family:var(--font-m);font-size:8px;
  letter-spacing:.18em;color:var(--txt3);
}

/* ══ OPP GRID ══ */
.opp-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(175px,1fr));
  gap:10px;
}
.ocard{
  background:var(--glass-2);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  padding:18px 16px;cursor:pointer;
  transition:all .22s;position:relative;overflow:hidden;
  backdrop-filter:blur(16px);
}
.ocard::after{
  content:'';
  position:absolute;inset:0;border-radius:var(--r-md);
  background:radial-gradient(ellipse at 50% 0%,rgba(167,139,250,.08),transparent 60%);
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.ocard:hover{
  border-color:rgba(167,139,250,.35);
  transform:translateY(-3px);
  box-shadow:0 20px 50px rgba(0,0,0,.35),0 0 0 1px rgba(167,139,250,.12);
}
.ocard:hover::after{opacity:1}
.ocard-sym{
  font-family:var(--font-d);font-size:18px;
  font-weight:600;letter-spacing:.02em;
  color:var(--txt);
}
.ocard-conf{
  font-family:var(--font-m);font-size:22px;font-weight:500;
}
.ocard-bar{
  height:2px;background:rgba(255,255,255,.06);
  overflow:hidden;margin:8px 0;border-radius:2px;
}
.ocard-fill{height:100%;border-radius:2px;transition:width 1.2s cubic-bezier(.25,.8,.25,1)}
.ocard-why{
  font-size:11px;color:var(--txt3);
  line-height:1.55;margin-top:8px;
  font-family:var(--font-s);
}
.dir-tag{
  font-family:var(--font-m);font-size:8px;
  letter-spacing:.1em;padding:3px 8px;
  border:1px solid;border-radius:var(--r-sm);
}
.dir-l{
  color:var(--green);
  border-color:rgba(110,231,183,.3);
  background:var(--green2);
}
.dir-s{
  color:var(--red);
  border-color:rgba(252,165,165,.3);
  background:var(--red2);
}
.lev-tag{
  font-family:var(--font-m);font-size:9px;
  color:var(--gold);border:1px solid rgba(252,211,77,.2);
  padding:3px 7px;border-radius:var(--r-sm);
  background:var(--gold2);
}

/* ══ CHAT ══ */
.chat-wrap{
  background:var(--glass-1);
  border:1px solid var(--border);
  border-radius:var(--r-xl);
  backdrop-filter:blur(30px);
  display:flex;flex-direction:column;
  height:500px;overflow:hidden;
}
.chat-hdr{
  padding:18px 22px;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.chat-name{
  font-family:var(--font-d);font-size:18px;
  font-weight:600;letter-spacing:.02em;
  background:linear-gradient(135deg,var(--txt),var(--violet2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.chat-sub{
  font-family:var(--font-m);font-size:9px;
  color:var(--txt3);letter-spacing:.12em;margin-top:3px;
}
.quick-row{
  display:flex;gap:6px;padding:10px 16px;
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;flex-shrink:0;
}
.qbtn{
  font-family:var(--font-m);font-size:9px;letter-spacing:.08em;
  padding:5px 12px;border:1px solid var(--border);
  border-radius:var(--r-sm);cursor:pointer;
  background:var(--glass-1);color:var(--txt3);
  transition:.18s;text-transform:uppercase;
}
.qbtn:hover{
  border-color:rgba(167,139,250,.3);
  color:var(--violet2);background:var(--violet4);
}
.chat-msgs{
  flex:1;overflow-y:auto;
  padding:18px 18px;
  display:flex;flex-direction:column;gap:12px;
  scroll-behavior:smooth;
}
.chat-msgs::-webkit-scrollbar{width:2px}
.chat-msgs::-webkit-scrollbar-thumb{
  background:rgba(167,139,250,.2);border-radius:2px;
}
.msg-u{
  align-self:flex-end;
  background:var(--violet3);
  border:1px solid rgba(167,139,250,.2);
  border-radius:var(--r-md) var(--r-md) 4px var(--r-md);
  padding:11px 16px;max-width:78%;
  font-size:13px;line-height:1.6;
  font-family:var(--font-s);
}
.msg-ai{
  align-self:flex-start;
  background:var(--glass-2);
  border:1px solid var(--border2);
  border-radius:var(--r-md) var(--r-md) var(--r-md) 4px;
  border-left:2px solid var(--violet);
  padding:13px 17px;max-width:90%;
  font-size:13px;line-height:1.75;
  color:var(--txt2);font-family:var(--font-s);
  backdrop-filter:blur(10px);
}
.msg-ai b,.msg-ai strong{color:var(--violet2);font-weight:500}
.msg-ai code{
  font-family:var(--font-m);font-size:11px;
  color:var(--gold);background:var(--gold2);
  padding:2px 6px;border-radius:5px;
}
.msg-ai em{color:var(--txt);font-style:italic;font-family:var(--font-d)}
.msg-lbl{
  font-family:var(--font-m);font-size:8px;
  letter-spacing:.18em;color:var(--violet);
  margin-bottom:6px;text-transform:uppercase;
}
.chat-bottom{
  padding:10px;border-top:1px solid var(--border);
  display:flex;gap:8px;flex-shrink:0;
}
.chat-inp{
  flex:1;background:var(--glass-2);
  border:1px solid var(--border);
  border-radius:var(--r-md);
  padding:11px 16px;
  color:var(--txt);font-size:13px;
  font-family:var(--font-s);outline:none;
  transition:border-color .2s,background .2s;
  backdrop-filter:blur(10px);
}
.chat-inp:focus{
  border-color:rgba(167,139,250,.4);
  background:var(--glass-3);
}
.chat-inp::placeholder{color:var(--txt3)}
.send-btn{
  background:linear-gradient(135deg,rgba(167,139,250,.25),rgba(167,139,250,.1));
  border:1px solid rgba(167,139,250,.3);
  border-radius:var(--r-md);
  width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--violet2);font-size:15px;
  transition:.18s;flex-shrink:0;
}
.send-btn:hover{
  background:rgba(167,139,250,.3);
  box-shadow:0 0 20px rgba(167,139,250,.18);
}
.send-btn:disabled{opacity:.3;cursor:not-allowed}

/* Typing */
.tdot{
  display:inline-block;width:5px;height:5px;
  background:var(--violet);border-radius:50%;
  margin:0 2px;animation:td 1.2s infinite;
}
.tdot:nth-child(2){animation-delay:.2s}
.tdot:nth-child(3){animation-delay:.4s}
@keyframes td{
  0%,80%,100%{opacity:.15;transform:scale(.6)}
  40%{opacity:1;transform:scale(1)}
}

/* ══ JOURNAL ══ */
.jcard{
  background:var(--glass-1);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  padding:12px 16px;
  display:flex;align-items:center;gap:12px;
  font-size:12px;
  backdrop-filter:blur(10px);
  transition:background .2s;
}
.jcard:hover{background:var(--glass-2)}

/* ══ BUTTONS ══ */
.btn{
  font-family:var(--font-m);font-size:9px;
  letter-spacing:.12em;text-transform:uppercase;
  padding:8px 14px;border:1px solid;
  border-radius:var(--r-sm);cursor:pointer;
  transition:.18s;background:transparent;
}
.btn-gold{
  border-color:rgba(252,211,77,.25);
  color:var(--gold);background:var(--gold2);
}
.btn-gold:hover{background:rgba(252,211,77,.18)}
.btn-ivory{
  border-color:var(--border);color:var(--txt2);
  background:var(--glass-1);
}
.btn-ivory:hover{
  border-color:var(--border2);color:var(--txt);
  background:var(--glass-2);
}
.btn-r{
  border-color:rgba(252,165,165,.2);
  color:var(--red);background:var(--red2);
}
.btn-r:hover{background:rgba(252,165,165,.15)}
.btn-g{
  border-color:rgba(110,231,183,.2);
  color:var(--green);background:var(--green2);
}
.btn-g:hover{background:rgba(110,231,183,.15)}

/* ══ OVERLAYS ══ */
.ov{
  position:fixed;inset:0;z-index:500;
  background:rgba(10,12,25,.75);
  backdrop-filter:blur(20px);
  display:flex;align-items:flex-end;justify-content:center;
}
.sheet{
  width:100%;max-width:560px;
  background:rgba(17,19,38,.92);
  backdrop-filter:blur(40px);
  border:1px solid var(--border2);
  border-top:1px solid rgba(167,139,250,.2);
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  padding:22px 22px 48px;
  max-height:90vh;overflow-y:auto;
  animation:sup .28s cubic-bezier(.34,1.35,.64,1);
}
@keyframes sup{
  from{transform:translateY(100%);opacity:0}
  to{transform:translateY(0);opacity:1}
}
.drag-handle{
  width:36px;height:3px;
  background:rgba(255,255,255,.12);
  border-radius:3px;margin:0 auto 22px;
}
.sheet-title{
  font-family:var(--font-d);font-size:20px;
  font-weight:600;letter-spacing:.02em;
  color:var(--violet2);margin-bottom:20px;
}

/* Entry grid */
.entry3{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:8px;margin:12px 0;
}
.ebox{
  border:1px solid;border-radius:var(--r-md);
  padding:12px;text-align:center;
}
.ebox-c{
  border-color:rgba(167,139,250,.2);
  background:rgba(167,139,250,.06);
}
.ebox-g{
  border-color:rgba(110,231,183,.2);
  background:rgba(110,231,183,.06);
}
.ebox-r{
  border-color:rgba(252,165,165,.2);
  background:rgba(252,165,165,.06);
}
.ebox-lbl{
  font-family:var(--font-m);font-size:8px;
  letter-spacing:.15em;color:var(--txt3);
  text-transform:uppercase;margin-bottom:4px;
}
.ebox-val{
  font-family:var(--font-m);font-size:13px;font-weight:500;
}

/* Field */
.flbl{
  font-family:var(--font-m);font-size:8px;
  letter-spacing:.15em;color:var(--txt3);
  text-transform:uppercase;display:block;margin-bottom:6px;
}
.finp{
  width:100%;background:var(--glass-2);
  border:1px solid var(--border);
  border-radius:var(--r-sm);padding:10px 14px;
  color:var(--txt);font-size:13px;font-family:var(--font-s);
  outline:none;transition:.2s;backdrop-filter:blur(10px);
}
.finp:focus{border-color:rgba(167,139,250,.4)}
.finp::placeholder{color:var(--txt3)}

/* PIN */
.pin-ov{
  position:fixed;inset:0;z-index:600;
  background:rgba(10,12,25,.88);
  backdrop-filter:blur(30px);
  display:flex;align-items:center;justify-content:center;
}
.pin-box{
  background:rgba(17,19,38,.95);
  border:1px solid var(--border2);
  border-radius:var(--r-xl);
  padding:32px 26px;width:280px;text-align:center;
  backdrop-filter:blur(40px);
  animation:scalein .22s cubic-bezier(.34,1.35,.64,1);
}
@keyframes scalein{
  from{transform:scale(.88);opacity:0}
  to{transform:scale(1);opacity:1}
}
.pdots{
  display:flex;justify-content:center;
  gap:16px;margin:16px 0;
}
.pdot{
  width:10px;height:10px;border-radius:50%;
  border:1px solid var(--txt3);transition:.15s;
}
.pdot.on{
  background:var(--violet);border-color:var(--violet);
  box-shadow:0 0 12px rgba(167,139,250,.6);
}
.pkeys{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:8px;margin-top:10px;
}
.pkey{
  background:var(--glass-2);
  border:1px solid var(--border);
