<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SNIPER BOT</title>

<style>
body{
  background:#0a0f25;
  color:white;
  font-family:Arial;
  margin:0;
  padding:20px;
}

button{
  padding:10px;
  margin:5px;
  background:#111;
  border:1px solid #444;
  color:white;
  cursor:pointer;
}

.card{
  background:#111;
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:1px solid #333;
}

</style>

</head>

<body>

<h2>🤖 SNIPER BOT (SIMU)</h2>

<button onclick="runAI()">SCAN IA</button> <button onclick="runBot()">LANCER BOT</button>

<h3>Opportunités</h3>
<div id="opps"></div>

<h3>Wallet</h3>
<input id="capInput" placeholder="capital">
<button onclick="saveCap()">Save</button>
<div id="wallet"></div>

<h3>Trades</h3>
<div id="trades"></div>

<script>

/******** STATE ********/
let capital = Number(localStorage.getItem("cap")||100);
let trades = [];
let signals = [];

const PAIRS = ["BTC","ETH","SOL"];

/******** API ********/
async function getHistory(sym){
  try{
    const res = await fetch(
      `https://api.binance.com/api/v3/klines?symbol=${sym}USDT&interval=1m&limit=30`
    );
    const data = await res.json();
    return data.map(c=>+c[4]);
  }catch{
    return [];
  }
}

/******** INDICATEURS ********/
function calcRSI(arr){
  let g=0,l=0;
  for(let i=1;i<arr.length;i++){
    let d=arr[i]-arr[i-1];
    d>0?g+=d:l-=d;
  }
  let rs=g/(l||1);
  return 100-(100/(1+rs));
}

function calcEMA(arr){
  let k=2/(arr.length+1);
  let ema=arr[0];
  for(let i=1;i<arr.length;i++){
    ema=arr[i]*k+ema*(1-k);
  }
  return ema;
}

/******** IA ********/
async function runAI(){
  signals = [];

  for(let sym of PAIRS){

    let h = await getHistory(sym);
    if(h.length<10) continue;

    let rsi = calcRSI(h);
    let ema = calcEMA(h);
    let price = h[h.length-1];

    if(rsi<30 && price>ema){
      signals.push({sym,dir:"LONG",price});
    }

    if(rsi>70 && price<ema){
      signals.push({sym,dir:"SHORT",price});
    }
  }

  renderOpps();
}

/******** BOT ********/
function runBot(){

  if(signals.length===0){
    alert("Aucun signal");
    return;
  }

  signals.forEach(s=>{

    let risk = capital*0.02;
    let size = risk/(s.price*0.01);

    trades.push({
      sym:s.sym,
      dir:s.dir,
      entry:s.price,
      size:size,
      time:new Date().toLocaleTimeString()
    });

    capital -= risk;
  });

  updateTrades();
  updateWallet();
}

/******** UI ********/
function renderOpps(){
  document.getElementById("opps").innerHTML =
    signals.map(s=>`
      <div class="card">
        ${s.sym} ${s.dir}
      </div>
    `).join("");
}

function updateTrades(){
  document.getElementById("trades").innerHTML =
    trades.map(t=>`
      <div class="card">
        ${t.time} - ${t.sym} ${t.dir}<br>
        Entry: ${t.entry.toFixed(2)}<br>
        Size: ${t.size.toFixed(4)}
      </div>
    `).join("");
}

function updateWallet(){
  document.getElementById("wallet").innerHTML =
    "Capital: "+capital.toFixed(2);
}

/******** WALLET ********/
function saveCap(){
  let v = Number(document.getElementById("capInput").value);
  if(v>0){
    capital=v;
    localStorage.setItem("cap",v);
    updateWallet();
  }
}

/******** INIT ********/
updateWallet();

</script>

</body>
</html>
