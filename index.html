<script>
// --- CONFIGURATION & ÉTAT ---
const CORRECT_PIN = '1704';
let pinBuffer = '';
let titleClickCount = 0;
let titleClickTimer = null;
let blurActive = false;
let currentPair = 'SOL';
let capital = parseFloat(localStorage.getItem('capital') || '20.57');
let goal = parseFloat(localStorage.getItem('goal') || '50.00');
let geminiKey = localStorage.getItem('geminiKey') || '';
let tradeHistory = JSON.parse(localStorage.getItem('tradeHistory') || '[]');
let priceData = {};
let currentTradeOpp = null;
let tickerWS = null;

// --- INITIALISATION ---
document.addEventListener('DOMContentLoaded', () => {
    updateUI();
    connectBinance();
    refreshOpportunities();
    updateHistoryUI();
});

function updateUI() {
    document.getElementById('capital-num').textContent = capital.toFixed(2);
    document.getElementById('goal-val').textContent = goal.toFixed(2);
    document.getElementById('exposure-val').textContent = '$' + (capital * 10).toFixed(2);
    
    const pct = Math.min((capital / goal) * 100, 100);
    document.getElementById('goal-bar').style.width = pct + '%';
    document.getElementById('goal-pct').textContent = pct.toFixed(1) + '%';
    
    document.getElementById('trade-count').textContent = tradeHistory.length;
    calculateWinRate();
}

// --- BINANCE WEBSOCKET ---
function connectBinance() {
    if (tickerWS) tickerWS.close();
    
    // On se connecte aux tickers de toutes les paires pour le bandeau du haut
    const pairs = ['btcusdt', 'ethusdt', 'solusdt', 'pepeusdt', 'wifusdt', 'bonkusdt'];
    tickerWS = new WebSocket(`wss://stream.binance.com:9443/ws/${pairs.map(p => p + '@ticker').join('/')}`);

    tickerWS.onmessage = (e) => {
        const d = JSON.parse(e.data);
        const sym = d.s.replace('USDT', '');
        const price = parseFloat(d.c);
        const change = parseFloat(d.P);

        // Update Ticker défilant
        const tickerEls = document.querySelectorAll(`[id^="t-${sym.toLowerCase()}"]`);
        tickerEls.forEach(el => {
            el.textContent = price.toFixed(sym === 'PEPE' || sym === 'BONK' ? 8 : 2);
            el.style.color = change >= 0 ? 'var(--green)' : 'var(--red)';
        });

        // Update Prix principal si c'est la paire active
        if (sym === currentPair) {
            const priceEl = document.getElementById('main-price');
            const changeEl = document.getElementById('price-change-badge');
            
            priceEl.textContent = price.toFixed(sym === 'PEPE' || sym === 'BONK' ? 8 : 2);
            changeEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '%';
            changeEl.className = `pnl-badge ${change >= 0 ? 'pnl-pos' : 'pnl-neg'}`;
            
            document.getElementById('price-high').textContent = parseFloat(d.h).toFixed(2);
            document.getElementById('price-low').textContent = parseFloat(d.l).toFixed(2);
            document.getElementById('price-vol').textContent = (parseFloat(d.q) / 1000000).toFixed(1) + 'M';
            
            priceData[sym] = price;
        }
    };
}

function switchPair(symbol) {
    currentPair = symbol;
    document.querySelectorAll('.pair-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('btn-' + symbol).classList.add('active');
    document.getElementById('pair-label').textContent = symbol + '/USDT';
    document.getElementById('main-price').textContent = '...';
}

// --- SYSTÈME DE TRADING ---
const MOCK_REASONS = [
    "Rupture de biseau ascendant détectée sur H1. Volume en hausse.",
    "Support institutionnel testé 3x. Rebond probable vers Fibonacci 0.618.",
    "Divergence haussière RSI + croisement MACD imminent.",
    "Liquidité de vente absorbée. Setup Sniper détecté par Gemini."
];

function refreshOpportunities() {
    const grid = document.getElementById('opp-grid');
    grid.innerHTML = '';
    const assets = ['SOL', 'BTC', 'ETH', 'PEPE', 'WIF'];
    
    assets.forEach(asset => {
        const dir = Math.random() > 0.4 ? 'LONG' : 'SHORT';
        const conf = Math.floor(Math.random() * 20) + 75;
        const lev = [10, 12, 13, 20][Math.floor(Math.random() * 4)];
        
        const card = document.createElement('div');
        card.className = 'opportunity-card';
        card.innerHTML = `
            <div style="display:flex;justify-content:space-between;margin-bottom:8px">
                <span style="font-weight:900;font-size:16px">${asset}/USDT</span>
                <span style="color:${dir === 'LONG' ? 'var(--green)' : 'var(--red)'};font-weight:900">${dir}</span>
            </div>
            <div style="font-size:11px;color:var(--cyan);font-weight:800;margin-bottom:4px">LEVIER x${lev} • CONF. ${conf}%</div>
            <div style="font-size:11px;color:#64748b;line-height:1.4">${MOCK_REASONS[Math.floor(Math.random()*MOCK_REASONS.length)]}</div>
        `;
        card.onclick = () => openTradeModal({asset, dir, lev, conf});
        grid.appendChild(card);
    });
}

function openTradeModal(opp) {
    currentTradeOpp = opp;
    const price = priceData[opp.asset] || 0;
    document.getElementById('modal-pair').textContent = opp.asset + '/USDT';
    document.getElementById('modal-lever').textContent = 'x' + opp.lev;
    document.getElementById('modal-dir').textContent = opp.dir;
    document.getElementById('modal-dir').style.color = opp.dir === 'LONG' ? 'var(--green)' : 'var(--red)';
    document.getElementById('modal-conf').textContent = opp.conf + '%';
    
    document.getElementById('modal-entry').textContent = price ? price.toFixed(4) : '...';
    document.getElementById('modal-tp').textContent = price ? (opp.dir === 'LONG' ? price * 1.02 : price * 0.98).toFixed(4) : '...';
    document.getElementById('modal-sl').textContent = price ? (opp.dir === 'LONG' ? price * 0.99 : price * 1.01).toFixed(4) : '...';
    
    document.getElementById('trade-overlay').style.display = 'flex';
}

function acceptTrade() {
    const isWin = Math.random() > 0.4; // 60% winrate
    const pnl = isWin ? (Math.random() * 5 + 2) : -(Math.random() * 3 + 1);
    
    capital += pnl;
    const trade = {
        pair: currentTradeOpp.asset,
        dir: currentTradeOpp.dir,
        pnl: pnl,
        date: new Date().toLocaleTimeString()
    };
    
    tradeHistory.unshift(trade);
    if(tradeHistory.length > 10) tradeHistory.pop();
    
    localStorage.setItem('capital', capital);
    localStorage.setItem('tradeHistory', JSON.stringify(tradeHistory));
    
    updateUI();
    updateHistoryUI();
    closeTradeModal();
    
    if(pnl > 0) triggerSniper();
}

function triggerSniper() {
    const banner = document.getElementById('signal-banner');
    banner.style.display = 'block';
    if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
    setTimeout(() => banner.style.display = 'none', 3000);
}

// --- CONFIG & SÉCURITÉ ---
function handleTitleClick() {
    titleClickCount++;
    clearTimeout(titleClickTimer);
    titleClickTimer = setTimeout(() => titleClickCount = 0, 1500);
    if (titleClickCount >= 5) {
        document.getElementById('pin-overlay').style.display = 'flex';
        titleClickCount = 0;
    }
}

function pinKey(val) {
    if (val === 'C') pinBuffer = '';
    else if (val === '⌫') pinBuffer = pinBuffer.slice(0, -1);
    else if (pinBuffer.length < 4) pinBuffer += val;
    
    document.querySelectorAll('.pin-dot').forEach((d, i) => {
        d.classList.toggle('filled', i < pinBuffer.length);
    });

    if (pinBuffer === CORRECT_PIN) {
        document.getElementById('pin-overlay').style.display = 'none';
        document.getElementById('settings-overlay').style.display = 'flex';
        pinBuffer = '';
    }
}

function saveCapital() {
    capital = parseFloat(document.getElementById('capital-input').value);
    localStorage.setItem('capital', capital);
    updateUI();
    closeSettings();
}

function saveApiKey() {
    geminiKey = document.getElementById('api-key-input').value;
    localStorage.setItem('geminiKey', geminiKey);
    alert("Clé Gemini sauvegardée !");
}

function toggleBlur() {
    blurActive = !blurActive;
    document.querySelectorAll('.blur-sensitive').forEach(el => {
        el.style.filter = blurActive ? 'blur(10px)' : 'none';
    });
}

// --- GEMINI CHAT ---
async function sendChat() {
    const input = document.getElementById('chat-input');
    const msg = input.value;
    if(!msg || !geminiKey) return;

    addChatMessage('user', msg);
    input.value = '';

    try {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiKey}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ contents: [{ parts: [{ text: `Tu es un expert en trading crypto. Capital: ${capital}$. Paire: ${currentPair}. Analyse : ${msg}` }] }]})
        });
        const data = await res.json();
        addChatMessage('ai', data.candidates[0].content.parts[0].text);
    } catch (e) {
        addChatMessage('ai', "Erreur : Vérifie ta clé API Gemini.");
    }
}

function addChatMessage(role, text) {
    const box = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = role === 'user' ? 'chat-msg-user' : 'chat-msg-ai';
    div.innerHTML = `<div style="font-size:10px;color:#475569;margin-bottom:4px">${role === 'user' ? 'Toi' : 'Gemini Pro ✦'}</div>${text}`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function updateHistoryUI() {
    const hist = document.getElementById('trade-history');
    if(tradeHistory.length === 0) return;
    hist.innerHTML = tradeHistory.map(t => `
        <div style="background:rgba(255,255,255,0.03);padding:10px;border-radius:12px;display:flex;justify-content:space-between;font-size:12px">
            <span><strong>${t.pair}</strong> ${t.dir}</span>
            <span style="color:${t.pnl >= 0 ? 'var(--green)' : 'var(--red)'}">${t.pnl >= 0 ? '+' : ''}${t.pnl.toFixed(2)}$</span>
        </div>
    `).join('');
}

function calculateWinRate() {
    if(tradeHistory.length === 0) return;
    const wins = tradeHistory.filter(t => t.pnl > 0).length;
    document.getElementById('win-rate').textContent = Math.round((wins / tradeHistory.length) * 100) + '%';
}

function closeSettings() { document.getElementById('settings-overlay').style.display = 'none'; }
function closeTradeModal() { document.getElementById('trade-overlay').style.display = 'none'; }
function closePinModal() { document.getElementById('pin-overlay').style.display = 'none'; pinBuffer = ''; }
</script>
